<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="">
	
	<title>Registration - Tilda</title>

	<script src="/js/t-fallback.min.js"></script>

	<link rel="shortcut icon" href="/img/tildafavicon.ico">
	<link rel="icon" href="/img/tildafavicon.svg" type="image/svg+xml">
	<link rel="apple-touch-icon" href="/img/tildafavicon-180x180.png" type="image/png">
	<link rel="stylesheet" type="text/css" href="/front/css/reset.css" onerror="this.loaderr='y';">
	<link rel="stylesheet" type="text/css" href="https://app.tildacdn.one/tfront/dashboard/t-sign.min.css?ver=v25122301" onerror="this.loaderr='y';">
	<link rel="stylesheet" type="text/css" href="https://static.tildacdn.one/css/fonts-tildasans.css" onerror="this.loaderr='y';">

	<script type="text/javascript" src="https://app.tildacdn.one/tfront/dashboard/t-sign-up.min.js?ver=v25122301" onerror="this.loaderr='y';"></script>
	<script type="text/javascript" src="https://app.tildacdn.one/tfront/dashboard/t-sign-dict.min.js?ver=v25122301" onerror="this.loaderr='y';"></script>

	<script type="text/javascript" src="/front/js/saveutm.js" onerror="this.loaderr='y';"></script>

	<script type="text/javascript">
		window.lang = 'EN';
		window.front_cdn_domain = 'app.tildacdn.one';
		
		function waitForScriptsAndInit(attempt) {
			attempt = attempt || 1;

			if (typeof tsignup__init === 'function') {
				tsignup__init();
				return;
			}

			if (attempt >= 10) {
				return;
			}

			setTimeout(function () {
				waitForScriptsAndInit(attempt + 1);
			}, 1000);
		}

		document.addEventListener("DOMContentLoaded", function () {
			waitForScriptsAndInit();
		});

	</script>

		
</head>
